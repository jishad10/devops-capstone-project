name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Patch nose for Python 3.11 compatibility
        run: |
          NOSE_PATH=$(python -c "import nose; import os; print(os.path.dirname(nose.__file__))")
          grep -rl "collections\.Callable" "$NOSE_PATH" | xargs -r sed -i 's/collections\.Callable/collections.abc.Callable/g'

      - name: Lint with flake8
        run: |
          flake8 service --count --max-line-length=127 --extend-ignore=E402 --statistics

      - name: Run unit tests with nosetests
        env:
          DATABASE_URI: "postgresql+psycopg2://postgres:postgres@localhost:5432/postgres"
        run: |
          nosetests
