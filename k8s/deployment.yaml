apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
    spec:
      containers:
        - name: accounts
          image: accounts:1.0
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URI
              value: "postgresql+psycopg2://postgres:H64zTuarGpCCrQ7OBNkRXFen@172.21.103.130:5432/postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: accounts
spec:
  selector:
    app: accounts
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
